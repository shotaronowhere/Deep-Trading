[profile.default]
src = "contracts"
test = "test"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [
    { access = "read", path = "./out" },
    { access = "read", path = "./node_modules" },
    { access = "read", path = "./lib/swap-router-contracts/node_modules" },
    { access = "read", path = "./lib/swap-router-contracts/artifacts" },
    { access = "read", path = "./test/fixtures" },
    { access = "write", path = "./test/fixtures" }
]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@uniswap/v3-core/=lib/v3-core/",
    "@uniswap/v3-periphery/=lib/v3-periphery/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "seer/=lib/seer-pm-demo/contracts/src/",
]
